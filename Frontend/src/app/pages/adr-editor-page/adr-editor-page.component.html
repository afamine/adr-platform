<div class="adr-page">
  <app-app-topbar />

  <div class="adr-page__workspace">
    <div class="adr-page__sidebar-shell">
      <app-sidebar
        [adrs]="filteredAdrs()"
        [selectedAdrId]="selectedAdr().id"
        [searchQuery]="searchQuery()"
        [statusFilter]="statusFilter()"
        (createAdr)="adrService.createAdr()"
        (searchQueryChange)="adrService.setSearchQuery($event)"
        (statusFilterChange)="adrService.setStatusFilter($event)"
        (adrSelected)="adrService.selectAdr($event)"
      />
    </div>

    <section class="adr-page__content-shell">
      @if (selectedAdr(); as adr) {
        <app-editor-header
          [title]="adr.title"
          [updatedAt]="adr.updatedAt"
          [author]="adr.author"
          [previewActive]="previewMode()"
          [collaborateActive]="collaborateMode()"
          [aiAssistActive]="aiAssistMode()"
          (titleChange)="adrService.updateTitle($event)"
          (previewClick)="adrService.togglePreview()"
          (collaborateClick)="adrService.toggleCollaborate()"
          (aiAssistClick)="adrService.toggleAiAssist()"
          (saveClick)="adrService.saveAdr()"
        />

        <div class="adr-page__meta-row">
          <div class="adr-page__meta-field">
            <label class="adr-page__meta-label" for="adr-status">Status:</label>
            <div class="adr-page__select-shell">
              <select id="adr-status" [value]="adr.status" (change)="updateStatus($any($event.target).value)">
                @for (option of statusOptions; track option.value) {
                  <option [value]="option.value">{{ option.label }}</option>
                }
              </select>
            </div>
          </div>

          <div class="adr-page__meta-field adr-page__meta-field--tags">
            <span class="adr-page__meta-label">Tags:</span>
            <div class="adr-page__tags">
              @for (tag of adr.tags; track tag) {
                <span class="adr-page__tag">{{ tag }}</span>
              }
            </div>
          </div>
        </div>

        <div class="adr-page__panel">
          <app-tab-nav [tabs]="tabs" [activeTab]="activeTab()" (tabChange)="adrService.setActiveTab($event)" />

          @if (activeSection(); as section) {
            <div class="adr-page__section-copy">
              <h2 class="adr-page__section-title">{{ section.question }}</h2>
              <p class="adr-page__section-subtitle">{{ section.placeholder }}</p>
            </div>

            <textarea
              class="adr-page__textarea"
              [class.adr-page__textarea--preview]="previewMode()"
              [readOnly]="previewMode()"
              [ngModel]="section.content"
              (ngModelChange)="updateActiveSection($event)"
              [attr.aria-label]="section.label + ' content'"
              placeholder="Start documenting the architecture decision here..."
            ></textarea>
          }
        </div>
      }
    </section>
  </div>
</div>
