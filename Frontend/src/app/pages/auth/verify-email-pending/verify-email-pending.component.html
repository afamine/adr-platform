<div class="pending-page">
  <div class="pending-card">
    <div class="card-header">
      <a class="brand" routerLink="/login" aria-label="Axiom home">
        <img src="assets/logos/svg/logo-horizontal-light-accent.svg" alt="Axiom" />
      </a>
      <div class="divider"></div>
      <h1 class="title">Check your inbox</h1>
    </div>

    <div class="state-block">
      <div class="status-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 7l9 6 9-6M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2"
                stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h2 class="state-title">We sent you a verification link</h2>
      <p class="state-message">
        We sent a verification link to <strong>{{ maskedEmail() }}</strong>.
        Click the link in that email to activate your account.
      </p>

      <button type="button" class="btn btn--primary" (click)="resend()" [disabled]="resending()">
        <span class="btn-spinner" *ngIf="resending()"></span>
        <span>{{ resending() ? 'Sending…' : 'Resend email' }}</span>
      </button>

      <p class="notice" *ngIf="notice() as msg">{{ msg }}</p>

      <a routerLink="/login" class="text-link">Back to sign in</a>
    </div>
  </div>
</div>
