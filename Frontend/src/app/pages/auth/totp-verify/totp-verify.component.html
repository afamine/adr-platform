<div class="tov-root">
  <div class="tov-card">
    <div class="tov-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0" y="0" width="48" height="48" rx="8" fill="#EEF2FF" />
        <g transform="translate(4,4)">
          <path d="M8 1L16 4V9C16 13.4183 12.4183 17 8 17C3.58172 17 0 13.4183 0 9V4L8 1Z" fill="#6366F1"/>
          <path d="M6 8L8.5 10.5L12 6" stroke="#EEF2FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </svg>
    </div>

    <h1 class="tov-heading">Two-Factor Authentication</h1>
    <p class="tov-subtitle">Enter the 6-digit code from your authenticator app</p>

    <form [formGroup]="form" (ngSubmit)="onVerify()" class="tov-form" novalidate>
      <label class="tov-label" for="code">Verification Code</label>
      <input
        id="code"
        type="text"
        formControlName="code"
        maxlength="6"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="0 0 0 0 0 0"
        class="tov-code"
        autocomplete="one-time-code"
      />

      <div *ngIf="errorMessage()" class="tov-error">⊘ {{ errorMessage() }}</div>

      <button type="submit" class="tov-verify" [disabled]="((form.get('code')?.value) || '').length < 6 || isLoading()">
        <span *ngIf="!isLoading()">Verify</span>
        <span *ngIf="isLoading()" class="shimmer-text">Verifying...</span>
      </button>
    </form>

    <button class="tov-back" (click)="goBack()">← Back to login</button>
    <div class="tov-footer">Code refreshes every 30 seconds</div>
  </div>
</div>
