<div class="verify-page">
  <div class="verify-card">
    <div class="card-header">
      <span class="brand-name">ADR Manager</span>
      <div class="divider"></div>
      <h1 class="title">Check your inbox</h1>
    </div>

    <div class="state-block">
      <div class="axiom-logo-wrapper" aria-hidden="true">
        <app-axiom-logo
          stage="splash"
          [size]="80"
          iconColor="#6366F1"
          (animationComplete)="onSplashComplete()">
        </app-axiom-logo>
      </div>

      <h2 class="state-title" [class.fade-in]="splashDone()">Check your inbox</h2>
      <p class="state-message">
        We sent a verification link to <strong>{{ email }}</strong>. Click it to activate your account.
      </p>
      <p class="tertiary-text">Didn't receive it? Check your spam folder.</p>

      <button
        type="button"
        class="btn btn--outline"
        (click)="resendEmail()"
        [disabled]="resending() || resendSuccess() || !email"
      >
        <span class="btn-spinner btn-spinner--dark" *ngIf="resending()"></span>
        <span>{{ resendSuccess() ? 'Sent!' : (resending() ? 'Sending…' : 'Resend verification email') }}</span>
      </button>

      <a routerLink="/login" class="back-link">Back to sign in</a>
    </div>
  </div>
</div>
