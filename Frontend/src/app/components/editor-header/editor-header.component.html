<div class="editor-header">
  <div class="editor-header__top-row">
    <div class="editor-header__title-wrap">
      <input
        class="editor-header__title-input"
        type="text"
        [value]="title()"
        (input)="titleChange.emit($any($event.target).value)"
        aria-label="ADR title"
      >

      <div class="editor-header__date-pill">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4.5" y="5.5" width="15" height="14" rx="2.5" stroke="currentColor" stroke-width="1.4" />
          <path d="M8 3.8v3.2M16 3.8v3.2M4.5 9.5h15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        <span>{{ updatedAt() }}</span>
      </div>
    </div>

    <div class="editor-header__actions-block">
      <div class="editor-header__actions">
        <button mat-stroked-button type="button" class="action-button" [class.action-button--active]="previewActive()" (click)="previewClick.emit()">
          <span class="action-button__content">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2.75 12c1.72-3.1 5.1-5.75 9.25-5.75 4.15 0 7.53 2.65 9.25 5.75-1.72 3.1-5.1 5.75-9.25 5.75-4.15 0-7.53-2.65-9.25-5.75Z" stroke="currentColor" stroke-width="1.5" />
              <circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="1.5" />
            </svg>
            <span>Preview</span>
          </span>
        </button>
        <button mat-stroked-button type="button" class="action-button" [class.action-button--active]="collaborateActive()" (click)="collaborateClick.emit()">
          <span class="action-button__content">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="9" cy="9.2" r="2.7" stroke="currentColor" stroke-width="1.5" />
              <circle cx="16.5" cy="10.5" r="2.2" stroke="currentColor" stroke-width="1.5" />
              <path d="M4.75 17.6c.84-2.16 2.87-3.5 5.25-3.5 2.37 0 4.39 1.34 5.23 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              <path d="M14.4 17.15c.53-1.36 1.74-2.2 3.2-2.2 1.04 0 1.98.43 2.65 1.18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            <span>Collaborate</span>
          </span>
        </button>
        <button mat-stroked-button type="button" class="action-button" [class.action-button--active]="aiAssistActive()" (click)="aiAssistClick.emit()">
          <span class="action-button__content">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12.1 3.75 13.34 7l3.41 1.24-3.41 1.24-1.24 3.26-1.24-3.26L7.45 8.24 10.86 7l1.24-3.25Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
              <path d="M17.6 12.85 18.3 14.7l1.85.7-1.85.69-.7 1.86-.69-1.86-1.86-.69 1.86-.7.69-1.85Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
            </svg>
            <span>AI Assist</span>
          </span>
        </button>
        <button mat-flat-button type="button" class="save-button" (click)="saveClick.emit()">
          <span class="action-button__content">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M6 4.75h9.85l2.4 2.4V19.25H6V4.75Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
              <path d="M9 4.75v4.15h5.5V4.75M9 19.25v-4.4h6v4.4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
            </svg>
            <span>Save</span>
          </span>
        </button>
      </div>

      <div class="editor-header__author-chip">Author: {{ author() }}</div>
    </div>
  </div>
</div>
