spring:
  application:
    name: AdrProject
  datasource:
    url: jdbc:postgresql://localhost:5432/Adr_Project
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    database-change-log-lock-table: databasechangeloglock_adr
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${MAIL_SMTP_HOST:localhost}
    port: ${MAIL_SMTP_PORT:2525}
    username: ${MAIL_SMTP_USERNAME:username}
    password: ${MAIL_SMTP_PASSWORD:password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl-ms: 86400000
  refresh-token-ttl-ms: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

cors:
  allowed-origins:
    - http://localhost:4200

password-reset:
  token-ttl: 20m
  frontend-url: http://localhost:4200/reset-password
  email-from: ADR Platform <noreply@example.local>
  email-subject: Reset your ADR Platform password
  app-base-url: ${APP_BASE_URL:http://localhost:8080}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}
  token:
    email-verification-expiry-hours: 24

logging:
  level:
    org.springframework.security: INFO
    com.adrplatform.auth: DEBUG
