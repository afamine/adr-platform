spring:
  application:
    name: AdrProject
  datasource:
    url: jdbc:postgresql://localhost:5432/Adr_Project
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    database-change-log-lock-table: databasechangeloglock_adr
  jackson:
    default-property-inclusion: non_null
  mail:
    host: in-v3.mailjet.com
    port: 587
    username: 7fbc7c4cae7f4ecf881419a8bf7e5286
    password: 4227d8f76f878948bba964cd94ff0c09
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl-ms: 86400000
  refresh-token-ttl-ms: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

cors:
  allowed-origins:
    - http://localhost:4200

password-reset:
  token-ttl: 20m
  frontend-url: http://localhost:4200/reset-password
  email-from: adrplatform.reset@outlook.com
  email-subject: Reset your ADR Platform password

logging:
  level:
    org.springframework.security: INFO
    com.adrplatform.auth: DEBUG
