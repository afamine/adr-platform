spring:
  application:
    name: AdrProject
  datasource:
    url: jdbc:postgresql://localhost:5432/Adr_Project
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    database-change-log-lock-table: databasechangeloglock_adr
  cache:
    type: caffeine
    cache-names: aiInsights
  jackson:
    default-property-inclusion: non_null
  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.3
          max-tokens: 800
    retry:
      max-attempts: 1
  mail:
    host: ${MAIL_SMTP_HOST:localhost}
    port: ${MAIL_SMTP_PORT:2525}
    username: ${MAIL_SMTP_USERNAME:username}
    password: ${MAIL_SMTP_PASSWORD:password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  # Access token: 15 minutes. Refresh token: 7 days (rotation on use).
  # Frontend intercepts 401 and calls POST /api/auth/refresh automatically.
  access-token-ttl-ms: 900000
  refresh-token-ttl-ms: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

cors:
  allowed-origins:
    - http://localhost:4200

password-reset:
  token-ttl: 20m
  frontend-url: http://localhost:4200/reset-password
  email-from: ADR Platform <noreply@example.local>
  email-subject: Reset your ADR Platform password
  app-base-url: ${APP_BASE_URL:http://localhost:8080}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}
  token:
    email-verification-expiry-hours: 24

logging:
  level:
    org.springframework.security: INFO
    com.adrplatform.auth: INFO
    org.springframework.ai.retry: ERROR
    org.springframework.ai.openai: WARN
