services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: adr_postgres
    environment:
      POSTGRES_DB: adrplatform
      POSTGRES_USER: adruser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adruser -d adrplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: adr_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/adrplatform
      SPRING_DATASOURCE_USERNAME: adruser
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      SPRING_APPLICATION_NAME: AdrProject
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-mailhog}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-1025}
      MAIL_SMTP_USERNAME: ${MAIL_SMTP_USERNAME:-}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:4200}
      CORS_ALLOWED_ORIGINS_0: ${CORS_ALLOWED_ORIGINS_0:-http://localhost:4200}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: adr_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: adr_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
